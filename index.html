<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/amazon-connect-streams@2.18.3/release/connect-streams.js"></script>
    <script
      type="text/javascript"
      src="amazon-connect-chat-interface.js"
    ></script>
    <style>
      @keyframes pulse {
        0%,
        100% {
          background-color: #fef3c7;
        }
        50% {
          background-color: #fde68a;
        }
      }
      .pulse-animation {
        animation: pulse 2s infinite;
      }
      .resizer {
        width: 8px;
        cursor: col-resize;
        background-color: transparent;
        position: relative;
        transition: background-color 0.2s;
        flex-shrink: 0;
        z-index: 10;
      }
      .resizer:hover {
        background-color: #3b82f6;
      }
      .resizer::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #e5e7eb;
        width: 1px;
        left: 50%;
        transform: translateX(-50%);
      }
      .resizer::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 4px;
        height: 50px;
        background-color: #9ca3af;
        border-radius: 3px;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .resizer:hover::after {
        opacity: 1;
        background-color: white;
      }
      /* Selected participant highlight */
      .participant-selected {
        background-color: #3b82f6 !important;
        border-left: 5px solid #1d4ed8 !important;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35) !important;
        color: white !important;
        position: relative;
      }
      .participant-selected .font-semibold {
        color: white !important;
      }
      .participant-selected .text-xs {
        color: rgba(255, 255, 255, 0.85) !important;
      }
      .participant-selected .btn-end {
        background-color: white !important;
        color: #ef4444 !important;
        border-color: white !important;
        font-weight: 600;
      }
      .participant-selected .btn-end:hover {
        background-color: #fee2e2 !important;
      }
      .participant-selected .btn-clear {
        background-color: rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        border-color: rgba(255, 255, 255, 0.5) !important;
        font-weight: 600;
      }
      .participant-selected .btn-clear:hover {
        background-color: rgba(255, 255, 255, 0.35) !important;
      }
      .participant-selected .btn-accept {
        background-color: white !important;
        color: #16a34a !important;
        font-weight: 600;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }
      .participant-selected .btn-accept:hover {
        background-color: #f0fdf4 !important;
      }
      .participant-selected .btn-reject {
        background-color: rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        font-weight: 600;
      }
      .participant-selected .btn-reject:hover {
        background-color: rgba(255, 255, 255, 0.35) !important;
      }
    </style>
  </head>

  <body class="bg-gray-50">
    <!-- Top Header Bar -->
    <div
      class="h-14 bg-gradient-to-r from-blue-600 to-blue-700 border-b border-blue-800 flex items-center justify-between px-6"
    >
      <h1 class="text-xl font-bold text-white">Amazon Connect Chat</h1>
      <div class="flex items-center gap-4">
        <div
          id="agentInfo"
          class="hidden flex items-center gap-3 text-white text-sm"
        >
          <span id="agentName" class="font-medium"></span>
          <span class="text-blue-200">|</span>
          <select
            id="stateDropdown"
            class="px-2 py-1 text-xs bg-white/20 text-white border border-white/30 rounded hover:bg-white/30 transition"
            onchange="handleSelectChange()"
          ></select>
        </div>
        <div class="flex gap-2">
          <button
            id="loginBtn"
            class="px-3 py-1.5 text-sm bg-white text-blue-600 rounded-lg hover:bg-blue-50 transition font-medium"
            onclick="init()"
          >
            登录
          </button>
          <button
            id="logoutBtn"
            class="hidden px-3 py-1.5 text-sm bg-white/20 text-white rounded-lg hover:bg-white/30 transition"
            onclick="Logout()"
          >
            退出
          </button>
          <button
            class="px-3 py-1.5 text-sm bg-white/20 text-white rounded-lg hover:bg-white/30 transition"
            id="ccpContainer-btn"
            onclick="showCCP()"
          >
            CCP
          </button>
          <button
            class="px-3 py-1.5 text-sm bg-white/20 text-white rounded-lg hover:bg-white/30 transition"
            id="logContainer-btn"
            onclick="showLog()"
          >
            日志
          </button>
        </div>
      </div>
    </div>

    <div class="flex" style="height: calc(100vh - 3.5rem)">
      <!-- Column 1: Chat Participants -->
      <div
        id="chatParticipants"
        class="bg-white flex flex-col"
        style="width: 25%; min-width: 200px; max-width: 50%"
      >
        <div class="p-4 border-b border-gray-200 bg-gray-50">
          <h2 class="text-sm font-semibold text-gray-700">参与者列表</h2>
        </div>

        <!-- Participants List -->
        <ul id="clist" class="overflow-y-auto border-b border-gray-200"></ul>

        <!-- CCP Container -->
        <div
          id="container-div"
          class="hidden w-full flex-1 border-b border-gray-200"
        ></div>

        <!-- Log Container -->
        <div
          id="logContainer"
          class="hidden border-t border-gray-200 p-3 bg-gray-50"
        >
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs text-gray-500 font-medium">系统日志</span>
            <button
              class="px-2 py-1 text-xs bg-gray-200 hover:bg-gray-300 rounded transition"
              onclick="clearOutput()"
            >
              清除
            </button>
          </div>
          <textarea
            id="logDisplay"
            readonly
            class="w-full h-48 text-xs border border-gray-300 rounded p-2 resize-none font-mono bg-white"
          ></textarea>
        </div>
      </div>

      <!-- Resizer 1 -->
      <div id="resizer1" class="resizer"></div>

      <!-- Column 2: Chat Messages -->
      <div id="chatMessages" class="bg-white flex flex-col" style="flex: 1">
        <div class="p-4 border-b border-gray-200 bg-gray-50">
          <h2 class="text-sm font-semibold text-gray-700">聊天消息</h2>
        </div>

        <div
          class="flex-1 overflow-y-auto p-4 bg-gradient-to-b from-gray-50 to-white"
          id="txtChatBox"
        >
          <!-- Messages will be displayed here -->
        </div>

        <div class="p-4 border-t border-gray-200 bg-white">
          <div
            class="flex items-center gap-2 border border-gray-300 rounded-full px-4 py-2 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent"
          >
            <button class="text-xl hover:scale-110 transition" title="附件">
              📎
            </button>
            <button class="text-xl hover:scale-110 transition" title="表情">
              😊
            </button>
            <input
              type="text"
              placeholder="输入消息..."
              id="txtMessage"
              class="flex-1 outline-none text-sm"
              onkeypress="if(event.key==='Enter') sendChatMessage()"
            />
            <button
              onclick="sendChatMessage()"
              class="px-4 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded-full text-sm font-medium transition"
            >
              发送
            </button>
          </div>
          <div class="mt-3 flex gap-2">
            <select
              id="myDropdown"
              class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
            ></select>
            <button
              class="px-4 py-1.5 bg-white border border-blue-500 text-blue-500 hover:bg-blue-50 rounded-lg text-sm font-medium transition"
              onclick="TransferChat()"
            >
              转接
            </button>
          </div>
        </div>
      </div>

      <!-- Resizer 2 -->
      <div id="resizer2" class="resizer"></div>

      <!-- Column 3: Participant Info -->
      <div
        id="participantInfoPanel"
        class="bg-white flex flex-col overflow-y-auto"
        style="width: 25%; min-width: 200px; max-width: 50%"
      >
        <div class="p-4 border-b border-gray-200 bg-gray-50">
          <h2 class="text-sm font-semibold text-gray-700">参与者信息</h2>
        </div>

        <div class="p-4 space-y-4" id="participantInfo">
          <div>
            <div
              class="text-xs font-semibold text-gray-500 uppercase tracking-wide"
            >
              姓名
            </div>
            <div class="mt-1 text-sm text-gray-800" id="participantName">-</div>
          </div>
          <div>
            <div
              class="text-xs font-semibold text-gray-500 uppercase tracking-wide"
            >
              邮箱
            </div>
            <div class="mt-1 text-sm text-gray-800" id="participantEmail">
              -
            </div>
          </div>
          <div>
            <div
              class="text-xs font-semibold text-gray-500 uppercase tracking-wide"
            >
              状态
            </div>
            <div class="mt-1 text-sm text-gray-800" id="participantStatus">
              -
            </div>
          </div>
          <div>
            <div
              class="text-xs font-semibold text-gray-500 uppercase tracking-wide"
            >
              联系ID
            </div>
            <div
              class="mt-1 text-sm text-gray-800 break-all"
              id="participantContactId"
            >
              -
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Hidden debug output -->
    <textarea id="message" style="display: none"></textarea>

    <script type="text/javascript">
      // ============================================================
      // 配置常量
      // ============================================================
      const instanceURL = "https://connect-us-1.my.connect.aws/";
      const instanceCCPURL = instanceURL + "ccp-v2/";
      const instanceRegion = "us-east-1";
      const loginURL = "";
      const logoutURL = "https://connect-us-1.my.connect.aws/connect/logout";

      // ============================================================
      // 全局状态管理
      // ============================================================
      const AppState = {
        contact: null,
        controller: null,
        currentContactId: null,
        timers: {},
        controllers: {},
        endpoints: [],
        chatMessages: {},
        unreadCounts: {},

        /** 重置所有状态 */
        reset() {
          this.contact = null;
          this.controller = null;
          this.currentContactId = null;
          this.timers = {};
          this.controllers = {};
          this.endpoints = [];
          this.chatMessages = {};
          this.unreadCounts = {};
        },

        /** 获取指定联系人的控制器 */
        getController(contactId) {
          return this.controllers[contactId] || null;
        },

        /** 获取当前活跃的控制器 */
        getActiveController() {
          return this.controller || this.getController(this.currentContactId);
        },
      };

      // ============================================================
      // DOM 工具函数
      // ============================================================

      /** 获取 DOM 元素的简写 */
      function $(id) {
        return document.getElementById(id);
      }

      /** 滚动元素到底部 */
      function scrollToBottom(element) {
        element.scrollTop = element.scrollHeight;
      }

      // ============================================================
      // 日志模块
      // ============================================================

      function logOutput(text) {
        const textarea = $("message");
        textarea.value += text + "\n";

        const logDisplay = $("logDisplay");
        if (logDisplay) {
          logDisplay.value = textarea.value;
          scrollToBottom(logDisplay);
        }
      }

      function clearOutput() {
        $("message").value = "";
        const logDisplay = $("logDisplay");
        if (logDisplay) {
          logDisplay.value = "";
        }
      }

      function showLog() {
        const logContainer = $("logContainer");
        const logBtn = $("logContainer-btn");
        const logDisplay = $("logDisplay");

        logContainer.classList.toggle("hidden");
        logBtn.textContent = logContainer.classList.contains("hidden")
          ? "日志"
          : "隐藏";

        if (!logContainer.classList.contains("hidden")) {
          logDisplay.value = $("message").value;
          scrollToBottom(logDisplay);
        }
      }

      // ============================================================
      // 时间格式化工具
      // ============================================================

      function getCurrentTime() {
        const now = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      }

      function convertToLocalTime(utcTimeString) {
        const d = new Date(utcTimeString);
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }

      function formatDuration(milliseconds) {
        const totalSeconds = Math.floor(milliseconds / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        const pad = (n) => String(n).padStart(2, "0");
        return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }

      // ============================================================
      // 联系人信息提取
      // ============================================================

      /** 安全获取客户名称 */
      function getCustomerName(contact) {
        try {
          const customerConn = contact.getConnections()[1];
          const info = customerConn.getMediaInfo().originalInfo;
          return (info && info.customerName) || "Anonymous";
        } catch (e) {
          return "Anonymous";
        }
      }

      /** 安全获取客户邮箱 */
      function getCustomerEmail(contact) {
        try {
          const customerConn = contact.getConnections()[1];
          const info = customerConn.getMediaInfo().originalInfo;
          return (info && info.customerEmail) || null;
        } catch (e) {
          return null;
        }
      }

      /** 通过 contactId 查找联系人对象 */
      function getContact(contactId) {
        try {
          const agent = new lily.Agent();
          const contacts = agent.getContacts();
          return contacts.find((item) => item.contactId === contactId) || null;
        } catch (e) {
          logOutput("查找联系人失败: " + e.message);
          return null;
        }
      }

      // ============================================================
      // 消息模板与渲染
      // ============================================================

      /** 生成接收消息的 HTML 模板，isRawHTML=true 时不转义 content */
      function buildReceivedMessageHTML(displayName, content, time, isRawHTML) {
        return (
          '<div class="mb-4 flex justify-start">' +
          '<div class="max-w-[70%]">' +
          '<div class="bg-gray-200 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-2 inline-block">' +
          (isRawHTML ? content : escapeHTML(content)) +
          "</div>" +
          '<div class="text-xs text-gray-500 mt-1">' +
          escapeHTML(displayName) +
          " · " +
          escapeHTML(time) +
          "</div>" +
          "</div></div>"
        );
      }

      /** 生成发送消息的 HTML 模板，isRawHTML=true 时不转义 content */
      function buildSentMessageHTML(content, time, isRawHTML) {
        return (
          '<div class="mb-4 flex justify-end">' +
          '<div class="max-w-[70%]">' +
          '<div class="bg-blue-500 text-white rounded-2xl rounded-tr-sm px-4 py-2 inline-block">' +
          (isRawHTML ? content : escapeHTML(content)) +
          "</div>" +
          '<div class="text-xs text-gray-500 mt-1 text-right">' +
          escapeHTML(time) +
          "</div>" +
          "</div></div>"
        );
      }

      /** HTML 转义，防止 XSS */
      function escapeHTML(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      /** 构建附件内容 HTML（图片/音频/下载链接） */
      function buildAttachmentHTML(attachmentUrl, attachment) {
        let html = "";

        if (attachment.ContentType === "image/png") {
          html += '<img src="' + attachmentUrl + '" style="max-width: 100%; height: auto;">';
        }

        if (attachment.ContentType === "audio/x-wav") {
          html +=
            '<audio controls style="max-width: 100%;"><source src="' +
            attachmentUrl +
            '" type="audio/wav">Your browser does not support the audio element.</audio>';
        }

        html +=
          '<a href="' +
          attachmentUrl +
          '" download="' +
          escapeHTML(attachment.AttachmentName) +
          '">' +
          escapeHTML(attachment.AttachmentName) +
          "</a>";

        return '<div class="attachment-item">' + html + "</div>";
      }

      /** 下载附件并生成 HTML */
      async function renderAttachments(attachments, controller) {
        let content = "";
        for (const attachment of attachments) {
          if (!controller) {
            logOutput("Error: 没有可用的控制器来下载附件");
            content +=
              '<div class="attachment-item"><span style="color: red;">Error: 无法下载附件</span></div>';
            continue;
          }

          try {
            const awsSdkResponse = await controller.downloadAttachment({
              attachmentId: attachment.AttachmentId,
            });
            const attachmentUrl = URL.createObjectURL(awsSdkResponse);
            content += buildAttachmentHTML(attachmentUrl, attachment);
          } catch (e) {
            logOutput("下载附件失败: " + e.message);
            content +=
              '<div class="attachment-item"><span style="color: red;">下载附件失败</span></div>';
          }
        }
        return content;
      }

      /** 将单条实时消息渲染为 HTML */
      async function renderChatMessage(response, controller) {
        if (!response.data) return "";

        const { Type, ParticipantRole, DisplayName, Content, Attachments } =
          response.data;
        const isSent = ParticipantRole === "AGENT";
        const time = getCurrentTime();
        const name = DisplayName || "Unknown";

        if (Type === "MESSAGE") {
          return isSent
            ? buildSentMessageHTML(Content || "", time)
            : buildReceivedMessageHTML(name, Content || "", time);
        }

        if (Type === "ATTACHMENT" && Attachments && Attachments.length > 0) {
          const attachmentContent = await renderAttachments(Attachments, controller);
          return isSent
            ? buildSentMessageHTML(attachmentContent, time, true)
            : buildReceivedMessageHTML(name, attachmentContent, time, true);
        }

        return "";
      }

      // ============================================================
      // 聊天消息管理
      // ============================================================

      /** 添加实时聊天消息 */
      async function addChatMessage(response, contactId) {
        const targetContactId = contactId || AppState.currentContactId;
        if (!targetContactId) return;

        const controller = AppState.getController(targetContactId);
        const message = await renderChatMessage(response, controller);

        // 存储消息
        if (!AppState.chatMessages[targetContactId]) {
          AppState.chatMessages[targetContactId] = "";
        }
        AppState.chatMessages[targetContactId] += message;

        // 非当前联系人的客户消息 → 增加未读计数
        const isFromCustomer = response.data.ParticipantRole !== "AGENT";
        const isNotCurrentContact = targetContactId !== AppState.currentContactId;
        if (isFromCustomer && isNotCurrentContact) {
          AppState.unreadCounts[targetContactId] =
            (AppState.unreadCounts[targetContactId] || 0) + 1;
          updateUnreadBadge(targetContactId);
          moveContactToTop(targetContactId);
        }

        // 当前联系人 → 刷新显示
        if (targetContactId === AppState.currentContactId) {
          const chatBox = $("txtChatBox");
          chatBox.innerHTML = AppState.chatMessages[targetContactId];
          scrollToBottom(chatBox);
        }
      }

      /** 加载历史聊天记录 */
      async function addChatTranscriptMessage(transcript, contactId) {
        let messages = "";

        for (const item of transcript) {
          const { Type, ParticipantRole, DisplayName, Content, AbsoluteTime, Attachments } = item;
          const isSent = ParticipantRole !== "CUSTOMER";
          const localTime = convertToLocalTime(AbsoluteTime);

          if (Type === "MESSAGE") {
            messages += isSent
              ? buildSentMessageHTML(Content, localTime)
              : buildReceivedMessageHTML(DisplayName, Content, localTime);
          }

          if (Type === "ATTACHMENT" && Attachments) {
            const controller = AppState.getController(contactId);
            const attachmentContent = await renderAttachments(Attachments, controller);
            messages += isSent
              ? buildSentMessageHTML(attachmentContent, localTime, true)
              : buildReceivedMessageHTML(DisplayName, attachmentContent, localTime, true);
          }
        }

        AppState.chatMessages[contactId] = messages;

        if (contactId === AppState.currentContactId) {
          const chatBox = $("txtChatBox");
          chatBox.innerHTML = messages;
          scrollToBottom(chatBox);
        }
      }

      /** 发送聊天消息 */
      function sendChatMessage() {
        const controller = AppState.getActiveController();

        if (!controller) {
          logOutput("错误: 没有可用的聊天控制器，请先选择一个联系人");
          alert("请先选择一个联系人");
          return;
        }

        const input = $("txtMessage");
        const msg = input.value.trim();
        if (!msg) {
          logOutput("消息内容为空，未发送");
          return;
        }

        controller.sendMessage({ contentType: "text/plain", message: msg });
        input.value = "";
        logOutput("send message:" + msg);
      }

      /** 加载指定联系人的聊天消息到显示区域 */
      function loadChatMessages(contactId) {
        const chatBox = $("txtChatBox");
        chatBox.innerHTML = AppState.chatMessages[contactId] || "";
        scrollToBottom(chatBox);
      }

      /** 清空聊天窗口 */
      function clearChatWindow(contactId) {
        const targetContactId = contactId || AppState.currentContactId;
        if (targetContactId) {
          delete AppState.chatMessages[targetContactId];
          if (targetContactId === AppState.currentContactId) {
            $("txtChatBox").innerHTML = "";
          }
        }
        $("txtMessage").value = "";
      }

      // ============================================================
      // 参与者列表管理
      // ============================================================

      /** 从列表中移除联系人 */
      function removeContact(contactId) {
        const item = $(contactId);
        if (item) {
          item.remove();
        }
      }

      /** 将联系人移到列表顶部 */
      function moveContactToTop(contactId) {
        const clist = $("clist");
        const contactElement = $(contactId);

        if (contactElement && clist.firstChild !== contactElement) {
          clist.removeChild(contactElement);
          clist.insertBefore(contactElement, clist.firstChild);
        }
      }

      /** 更新未读消息徽章 */
      function updateUnreadBadge(contactId) {
        const unreadElement = $(contactId + "-unread");
        if (!unreadElement) return;

        const count = AppState.unreadCounts[contactId] || 0;
        unreadElement.innerHTML =
          count > 0
            ? '<span class="ml-2 px-2 py-0.5 text-xs bg-red-500 text-white rounded-full">' + count + "</span>"
            : "";
      }

      /** 将联系人元素插入列表顶部 */
      function insertAtTop(element) {
        const clist = $("clist");
        if (clist.firstChild) {
          clist.insertBefore(element, clist.firstChild);
        } else {
          clist.appendChild(element);
        }
      }

      /** 创建参与者列表项的基础元素 */
      function createParticipantItem(contactId, className, contact) {
        const li = document.createElement("li");
        li.id = contactId;
        li.className = className;
        li.onclick = () => selectParticipant(contact);
        return li;
      }

      /** 添加"连接中"状态的联系人 */
      function addConnectingContact(contact) {
        removeContact(contact.contactId);

        const li = createParticipantItem(
          contact.contactId,
          "p-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition border-l-4 border-l-yellow-400 pulse-animation",
          contact
        );

        li.innerHTML =
          '<div class="flex justify-between items-center">' +
          '  <div class="flex-1">' +
          '    <div class="font-semibold text-gray-800">' + escapeHTML(getCustomerName(contact)) + "</div>" +
          '    <div class="text-xs text-gray-500" id="' + contact.contactId + '-indicator">连接中...</div>' +
          "  </div>" +
          '  <div class="flex gap-1">' +
          '    <button class="btn-accept px-2 py-1 text-xs bg-green-500 hover:bg-green-600 text-white rounded transition" onclick="acceptContact()">接受</button>' +
          '    <button class="btn-reject px-2 py-1 text-xs bg-red-500 hover:bg-red-600 text-white rounded transition" onclick="rejectContact()">拒绝</button>' +
          "  </div>" +
          "</div>";

        insertAtTop(li);
        restartTimer(contact.contactId, "连接中");
      }

      /** 添加"已连接"状态的联系人 */
      function addConnectedContact(contact) {
        removeContact(contact.contactId);

        const li = createParticipantItem(
          contact.contactId,
          "p-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition",
          contact
        );

        // 初始化未读计数
        if (!AppState.unreadCounts[contact.contactId]) {
          AppState.unreadCounts[contact.contactId] = 0;
        }

        const unreadCount = AppState.unreadCounts[contact.contactId];
        const unreadBadge =
          unreadCount > 0
            ? '<span class="ml-2 px-2 py-0.5 text-xs bg-red-500 text-white rounded-full">' + unreadCount + "</span>"
            : "";

        li.innerHTML =
          '<div class="flex justify-between items-center">' +
          '  <div class="flex-1">' +
          '    <div class="flex items-center">' +
          '      <span class="font-semibold text-gray-800">' + escapeHTML(getCustomerName(contact)) + "</span>" +
          '      <span id="' + contact.contactId + '-unread">' + unreadBadge + "</span>" +
          "    </div>" +
          '    <div class="text-xs text-green-600" id="' + contact.contactId + '-indicator">已连接</div>' +
          "  </div>" +
          '  <div class="flex gap-1">' +
          '    <button class="btn-end px-2 py-1 text-xs border border-red-500 text-red-500 hover:bg-red-50 rounded transition" onclick="endContact(\'' + contact.contactId + '\')">结束</button>' +
          '    <button class="btn-clear px-2 py-1 text-xs border border-gray-400 text-gray-600 hover:bg-gray-50 rounded transition" onclick="clearContact(\'' + contact.contactId + '\')">清除</button>' +
          "  </div>" +
          "</div>";

        insertAtTop(li);
        restartTimer(contact.contactId, "已连接");

        // 没有当前联系人时自动选中
        if (!AppState.currentContactId) {
          selectParticipant(contact);
        } else if (AppState.currentContactId === contact.contactId) {
          // 当前选中的联系人状态变更，刷新右侧面板
          $("participantStatus").textContent = contact.getState().type;
        }
      }

      /** 添加"未接"状态的联系人 */
      function addMissedContact(contact) {
        removeContact(contact.contactId);

        const li = createParticipantItem(
          contact.contactId,
          "p-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition",
          contact
        );

        li.innerHTML =
          '<div class="flex justify-between items-center">' +
          '  <div class="flex-1">' +
          '    <div class="font-semibold text-gray-800">聊天</div>' +
          '    <div class="text-xs text-yellow-600" id="' + contact.contactId + '-indicator">未接</div>' +
          "  </div>" +
          "  <div>" +
          '    <button class="btn-clear px-2 py-1 text-xs border border-gray-400 text-gray-600 hover:bg-gray-50 rounded transition" onclick="clearContact(\'' + contact.contactId + '\')">清除</button>' +
          "  </div>" +
          "</div>";

        $("clist").appendChild(li);
        restartTimer(contact.contactId, "未接");
      }

      /** 选中参与者 */
      function selectParticipant(contact) {
        // 移除所有选中状态
        document.querySelectorAll("#clist > li").forEach((item) => {
          item.classList.remove("participant-selected");
        });

        const el = $(contact.contactId);
        if (el) {
          el.classList.remove("pulse-animation", "border-l-yellow-400");
          el.classList.add("participant-selected");
        }

        // 更新全局状态
        AppState.currentContactId = contact.contactId;
        AppState.contact = contact;
        AppState.controller = AppState.getController(contact.contactId);

        if (!AppState.controller) {
          logOutput("警告: 联系人 " + contact.contactId + " 的控制器尚未初始化");
        }

        // 清除未读计数
        if (AppState.unreadCounts[contact.contactId]) {
          AppState.unreadCounts[contact.contactId] = 0;
          updateUnreadBadge(contact.contactId);
        }

        // 更新右侧参与者信息面板
        $("participantName").textContent = getCustomerName(contact);
        $("participantContactId").textContent = contact.contactId;
        $("participantStatus").textContent = contact.getState().type;
        $("participantEmail").textContent = getCustomerEmail(contact) || "-";

        // 加载聊天消息
        loadChatMessages(contact.contactId);
      }

      // ============================================================
      // 计时器管理
      // ============================================================

      /** 启动/重启联系人状态计时器 */
      function restartTimer(contactId, statusText) {
        // 清除已有计时器
        const existingTimer = AppState.timers[contactId];
        if (existingTimer) {
          clearInterval(existingTimer);
          delete AppState.timers[contactId];
        }

        const startTime = Date.now();
        AppState.timers[contactId] = setInterval(() => {
          const elapsed = Date.now() - startTime;
          const indicator = $(contactId + "-indicator");
          if (indicator) {
            indicator.textContent = " " + statusText + " " + formatDuration(elapsed);
          }
        }, 1000);
      }

      /** 停止联系人状态计时器 */
      function stopTimer(contactId) {
        const timer = AppState.timers[contactId];
        if (timer) {
          clearInterval(timer);
          delete AppState.timers[contactId];
        }
      }

      // ============================================================
      // 联系人操作（接受/拒绝/结束/清除/转接）
      // ============================================================

      /** 接受来电联系人 */
      function acceptContact() {
        const contact = AppState.contact;
        if (!contact) {
          alert("没有待接受的联系人");
          return;
        }

        contact.accept({
          success() {
            const el = $(contact.contactId);
            if (el) {
              el.classList.remove("pulse-animation", "border-l-yellow-400");
            }
            // 更新右侧参与者信息面板的状态
            if (AppState.currentContactId === contact.contactId) {
              $("participantStatus").textContent = contact.getState().type;
            }
          },
          failure(err) {
            logOutput("接受联系人失败: " + JSON.stringify(err));
          },
        });
      }

      /** 拒绝来电联系人 */
      function rejectContact() {
        const contact = AppState.contact;
        if (!contact) {
          alert("没有待拒绝的联系人");
          return;
        }

        contact.reject({
          success() {
            removeContact(contact.contactId);
          },
          failure(err) {
            logOutput("拒绝联系人失败: " + JSON.stringify(err));
          },
        });
      }

      /** 结束指定联系人 */
      function endContact(contactId) {
        const contact = getContact(contactId);
        if (!contact) {
          alert("未找到该联系人");
          return;
        }

        const initialConnection = contact.getInitialConnection();
        if (initialConnection) {
          initialConnection.destroy({
            success() {},
            failure(err) {
              alert(err);
            },
          });
        }

        restartTimer(contactId, "ACW");
      }

      /** 清除指定联系人 */
      function clearContact(contactId) {
        const contact = getContact(contactId);

        if (contact) {
          // 联系人仍在座席列表中，调用 API 清除
          contact.clear({
            success() {
              cleanupContact(contactId);
            },
            failure(err) {
              logOutput("清除联系人失败: " + JSON.stringify(err));
              // API 调用失败也清理 UI（联系人可能已结束）
              cleanupContact(contactId);
            },
          });
        } else {
          // 联系人已不在座席列表中（通话已结束），直接清理 UI
          logOutput("联系人已结束，直接清理 UI: " + contactId);
          cleanupContact(contactId);
        }
      }

      /** 清理联系人相关的 UI 和状态 */
      function cleanupContact(contactId) {
        removeContact(contactId);
        clearChatWindow(contactId);
        stopTimer(contactId);
        delete AppState.controllers[contactId];
        delete AppState.unreadCounts[contactId];

        // 如果清除的是当前选中的联系人，重置当前状态并清空信息面板
        if (AppState.currentContactId === contactId) {
          AppState.currentContactId = null;
          AppState.controller = null;
          AppState.contact = null;
          resetParticipantInfo();
        }
      }

      /** 重置右侧参与者信息面板为默认值 */
      function resetParticipantInfo() {
        $("participantName").textContent = "-";
        $("participantEmail").textContent = "-";
        $("participantStatus").textContent = "-";
        $("participantContactId").textContent = "-";
      }

      /** 转接聊天 */
      function transferChat() {
        const endpoint = getSelectedEndpoint();
        if (!endpoint) {
          alert("请先选择转接目标");
          return;
        }

        try {
          const agent = new lily.Agent();
          const chatContacts = agent.getContacts(lily.ContactType.CHAT);
          if (!chatContacts || chatContacts.length === 0) {
            alert("没有可转接的聊天联系人");
            return;
          }

          chatContacts[0].addConnection(endpoint, {
            success() {},
            failure() {
              alert("转接聊天失败");
            },
          });
        } catch (e) {
          logOutput("转接聊天异常: " + e.message);
          alert("转接聊天失败");
        }
      }

      // ============================================================
      // 座席状态与快速连接
      // ============================================================

      function showAgentLoginInfo(agent) {
        $("agentName").textContent = agent.getName() || "未知用户";
        $("agentInfo").classList.remove("hidden");
        $("loginBtn").classList.add("hidden");
        $("logoutBtn").classList.remove("hidden");
        logOutput("用户登录: " + $("agentName").textContent);
      }

      function hideAgentLoginInfo() {
        $("agentInfo").classList.add("hidden");
        $("loginBtn").classList.remove("hidden");
        $("logoutBtn").classList.add("hidden");
        logOutput("用户已退出登录");
      }

      function showAgentStatus(trigger, agent) {
        logOutput(trigger + " event : " + agent.getName() + " goes " + agent.getState().name);
      }

      /** 设置座席状态 */
      function setAgentState(stateName) {
        try {
          const agent = new lily.Agent();
          const states = agent.getAgentStates();
          const state = states.find((s) => s.name === stateName);
          if (state) {
            agent.setState(state, {
              success() {},
              failure() {
                logOutput("设置座席状态失败: " + stateName);
              },
            });
          }
        } catch (e) {
          logOutput("设置座席状态异常: " + e.message);
        }
      }

      /** 加载座席状态下拉列表 */
      function loadAgentStates() {
        try {
          const agent = new lily.Agent();
          const curState = agent.getState().name;
          const states = agent.getAgentStates();
          states.sort((a, b) => a.name.localeCompare(b.name));

          const dropdown = $("stateDropdown");
          dropdown.options.length = 0;

          states.forEach((state, i) => {
            const option = document.createElement("option");
            option.value = i;
            option.text = state.name;
            if (state.name === curState) {
              option.selected = true;
            }
            dropdown.add(option);
          });
        } catch (e) {
          logOutput("加载座席状态失败: " + e.message);
        }
      }

      /** 座席状态下拉框变更处理 */
      function handleSelectChange() {
        const dropdown = $("stateDropdown");
        const selectedOption = dropdown.options[dropdown.selectedIndex];
        if (selectedOption) {
          setAgentState(selectedOption.text);
        }
      }

      /** 加载快速连接列表 */
      function loadQuickConnects() {
        try {
          const agent = new lily.Agent();
          const queuesARNs = agent.getAllQueueARNs();
          agent.getEndpoints(queuesARNs, {
            success(data) {
              AppState.endpoints = data.endpoints;
              const dropdown = $("myDropdown");
              dropdown.options.length = 0;

              data.endpoints.forEach((ep, i) => {
                const option = document.createElement("option");
                option.value = i;
                option.text = ep.name;
                dropdown.add(option);
              });
            },
            failure() {
              logOutput("加载快速连接失败");
            },
          });
        } catch (e) {
          logOutput("加载快速连接异常: " + e.message);
        }
      }

      /** 获取当前选中的转接端点 */
      function getSelectedEndpoint() {
        const dropdown = $("myDropdown");
        const selectedIndex = dropdown.selectedIndex;
        if (selectedIndex !== -1) {
          return AppState.endpoints[dropdown.options[selectedIndex].value] || null;
        }
        return null;
      }

      /** 加载未接联系人 */
      function loadMissedContact() {
        try {
          const agent = new lily.Agent();
          const contact = agent
            .getContacts()
            .find((c) => c.getState().type === "error");
          if (contact) {
            addMissedContact(contact);
          }
        } catch (e) {
          logOutput("加载未接联系人失败: " + e.message);
        }
      }

      // ============================================================
      // CCP 与 UI 控制
      // ============================================================

      function showCCP() {
        const ccpDiv = $("container-div");
        ccpDiv.classList.toggle("hidden");
        $("ccpContainer-btn").textContent = ccpDiv.classList.contains("hidden")
          ? "CCP"
          : "隐藏";
      }

      // ============================================================
      // Connect Streams 事件订阅
      // ============================================================

      /** 订阅联系人事件 */
      function subscribeToContactEvents(contact) {
        contact.onConnecting((c) => {
          logOutput("onConnecting event : handleContactConnecting");
          AppState.contact = c;
          addConnectingContact(c);
        });

        contact.onConnected((c) => {
          logOutput("onConnected event : Contact connected to agent");
          AppState.contact = c;
          addConnectedContact(c);
          if (!AppState.controllers[c.contactId]) {
            initChatController(c);
          }
        });

        contact.onAccepted(() => {
          initChatController(contact);
        });

        contact.onACW((c) => {
          addConnectedContact(c);
        });

        contact.onEnded(() => {
          logOutput("onEnded event");
        });

        contact.onRefresh(() => {
          logOutput("onRefresh event");
        });

        contact.onMissed((c) => {
          logOutput("onMissed event");
          addMissedContact(c);
        });
      }

      /** 订阅座席事件 */
      function subscribeToAgentEvents(agent) {
        logOutput("Agent login");
        showAgentLoginInfo(agent);

        agent.onStateChange(() => {
          showAgentStatus("onStateChange", agent);
          loadAgentStates();
        });

        agent.onOffline(() => {
          showAgentStatus("onOffline", agent);
          hideAgentLoginInfo();
        });

        agent.onRefresh(() => logOutput("Agent onRefresh"));
        agent.onRoutable(() => logOutput("Agent onRoutable"));
        agent.onNotRoutable(() => logOutput("Agent onNotRoutable"));
        agent.onSoftphoneError(() => logOutput("Agent onSoftphoneError"));

        agent.onWebSocketConnectionLost(() =>
          logOutput("Agent onWebSocketConnectionLost")
        );

        agent.onWebSocketConnectionGained(() => {
          logOutput("Agent onWebSocketConnectionGained");
          showAgentLoginInfo(agent);
          loadAgentStates();
        });

        agent.onAfterCallWork(() => logOutput("Agent onAfterCallWork"));

        loadAgentStates();
        loadQuickConnects();
        loadMissedContact();
      }

      // ============================================================
      // 聊天控制器初始化
      // ============================================================

      async function initChatController(contact) {
        const cnn = contact.getAgentConnection();
        if (!cnn) return;

        try {
          const controller = await cnn.getMediaController();
          AppState.controllers[contact.contactId] = controller;

          // 如果没有当前联系人，设为当前
          if (!AppState.currentContactId) {
            AppState.currentContactId = contact.contactId;
            AppState.controller = controller;
          }

          // 监听新消息
          controller.onMessage(async (response) => {
            logOutput("on message:" + JSON.stringify(response));
            await addChatMessage(response, contact.contactId);
          });

          // 加载历史记录
          const awsSdkResponse = await controller.getTranscript({
            maxResults: 100,
            sortOrder: "ASCENDING",
          });
          const { Transcript } = awsSdkResponse.data;
          await addChatTranscriptMessage(Transcript, contact.contactId);
          logOutput(JSON.stringify(Transcript));

          // 监听连接丢失
          controller.onConnectionLost((response) => {
            logOutput("connection lost:" + JSON.stringify(response));
          });
        } catch (e) {
          logOutput("初始化聊天控制器失败: " + e.message);
        }
      }

      // ============================================================
      // CCP 核心初始化
      // ============================================================

      function initCore(ccpUrl, loginUrl, region) {
        const containerDiv = $("container-div");
        try {
          connect.core.initCCP(containerDiv, {
            ccpUrl: ccpUrl,
            loginUrl: loginUrl,
            loginPopup: true,
            loginPopupAutoClose: true,
            loginOptions: {
              autoClose: true,
              height: 600,
              width: 400,
              top: (window.screen.height - 600) / 2,
              left: (window.screen.width - 400) / 2,
            },
            region: region,
            softphone: {
              allowFramedSoftphone: true,
              disableRingtone: false,
            },
            chat: {
              disableRingtone: false,
              ringtoneUrl:
                "http://127.0.0.1:54093/agent-chat-demo-customized/ringtone.mp3",
            },
            pageOptions: {
              enableAudioDeviceSettings: true,
              enablePhoneTypeSettings: true,
            },
            ccpAckTimeout: 5000,
            ccpSynTimeout: 3000,
            ccpLoadTimeout: 10000,
          });
        } catch (err) {
          logOutput("CCP初始化失败: " + JSON.stringify(err));
        }
      }

      // ============================================================
      // 应用入口
      // ============================================================

      function init() {
        window.localStorage.removeItem(
          "connectPopupManager::connect::loginPopup"
        );

        AppState.reset();

        initCore(instanceCCPURL, loginURL, instanceRegion);

        connect.contact(subscribeToContactEvents);
        connect.agent(subscribeToAgentEvents);

        // 延迟检查座席是否已初始化
        setTimeout(() => {
          try {
            const agent = new lily.Agent();
            if (agent && agent.getName()) {
              showAgentLoginInfo(agent);
              loadAgentStates();
              loadQuickConnects();
            }
          } catch (e) {
            logOutput("等待agent初始化: " + e.message);
          }
        }, 1000);
      }

      function Logout() {
        hideAgentLoginInfo();
        fetch(logoutURL, { credentials: "include", mode: "no-cors" })
          .then(() => {
            const eventBus = connect.core.getEventBus();
            eventBus.trigger(connect.EventType.TERMINATE);
            clearChatWindow();
          })
          .then(() => {
            window.location.reload();
          });
      }

      // 兼容 HTML 中 onclick="TransferChat()" 的旧调用
      function TransferChat() { transferChat(); }
      function AcceptContact() { acceptContact(); }
      function RejectContact() { rejectContact(); }
      function EndContact(id) { endContact(id); }
      function ClearContact(id) { clearContact(id); }
      function SetAgentState(name) { setAgentState(name); }

      // ============================================================
      // 面板拖拽调整大小（带持久化）
      // ============================================================
      (function () {
        const resizer1 = $("resizer1");
        const resizer2 = $("resizer2");
        const leftPanel = $("chatParticipants");
        const rightPanel = $("participantInfoPanel");
        const STORAGE_KEY = "chatLayoutWidths";

        let isResizing = false;
        let currentResizer = null;
        let startX = 0;
        let startWidth = 0;

        function loadLayout() {
          try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return;
            const layout = JSON.parse(saved);
            if (layout.leftPanelWidth) {
              leftPanel.style.width = layout.leftPanelWidth + "px";
              leftPanel.style.flexGrow = "0";
              leftPanel.style.flexShrink = "0";
            }
            if (layout.rightPanelWidth) {
              rightPanel.style.width = layout.rightPanelWidth + "px";
              rightPanel.style.flexGrow = "0";
              rightPanel.style.flexShrink = "0";
            }
            logOutput("布局已从本地存储恢复");
          } catch (e) {
            logOutput("加载布局失败: " + e.message);
          }
        }

        function saveLayout() {
          try {
            localStorage.setItem(
              STORAGE_KEY,
              JSON.stringify({
                leftPanelWidth: leftPanel.offsetWidth,
                rightPanelWidth: rightPanel.offsetWidth,
                timestamp: new Date().toISOString(),
              })
            );
          } catch (e) {
            logOutput("保存布局失败: " + e.message);
          }
        }

        function initResizer(resizer, targetPanel, isLeftPanel) {
          resizer.addEventListener("mousedown", (e) => {
            isResizing = true;
            startX = e.clientX;
            startWidth = targetPanel.offsetWidth;
            currentResizer = { targetPanel, isLeftPanel };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
            e.preventDefault();
          });
        }

        initResizer(resizer1, leftPanel, true);
        initResizer(resizer2, rightPanel, false);

        document.addEventListener("mousemove", (e) => {
          if (!isResizing || !currentResizer) return;

          const { targetPanel, isLeftPanel } = currentResizer;
          const containerWidth = targetPanel.parentElement.offsetWidth;
          const deltaX = isLeftPanel
            ? e.clientX - startX
            : startX - e.clientX;
          const newWidth = startWidth + deltaX;
          const minWidth = 200;
          const maxWidth = containerWidth * 0.5;

          if (newWidth >= minWidth && newWidth <= maxWidth) {
            targetPanel.style.width = newWidth + "px";
            targetPanel.style.flexGrow = "0";
            targetPanel.style.flexShrink = "0";
          }
        });

        document.addEventListener("mouseup", () => {
          if (isResizing) {
            isResizing = false;
            currentResizer = null;
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
            saveLayout();
          }
        });

        loadLayout();
      })();

      // 页面加载完成后自动初始化
      window.addEventListener("DOMContentLoaded", () => {
        logOutput("页面加载完成，尝试恢复会话...");
        init();
      });
    </script>
  </body>
</html>
